server:
  port: 8082

spring:
  application:
    name: notification-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true

logging:
  level:
    com.notificationservice: DEBUG
    com.netflix.discovery: INFO
    com.netflix.eureka: INFO